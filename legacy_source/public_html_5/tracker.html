<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    
    <!-- Manifest e PWA -->
<link rel="manifest" href="/pwa/manifest.json?v=1">
<meta name="theme-color" content="#111827">

<!-- iOS (não lê o manifest) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/logo-reciclaguapi.png">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tracker RioFaz</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <!-- Compass (opcional) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-compass/dist/leaflet-compass.css" />
  <script src="https://unpkg.com/leaflet-compass/dist/leaflet-compass.min.js"></script>

  <style>
    html, body { height: 100%; }
    :root{
      --sat: env(safe-area-inset-top);
      --sar: env(safe-area-inset-right);
      --sab: env(safe-area-inset-bottom);
      --sal: env(safe-area-inset-left);
    }
    #map { position: absolute; inset: 0; }

    /* ===== Bottom Sheet (visual) ===== */
    .sheet{
      position: absolute; left: 0; right: 0; bottom: 0; z-index: 1001;
      background: linear-gradient(180deg, rgba(17,24,39,.94), rgba(17,24,39,.98));
      color:#e5e7eb; backdrop-filter: blur(10px);
      border-top-left-radius: 1.25rem; border-top-right-radius: 1.25rem;
      box-shadow: 0 -20px 40px rgba(0,0,0,.55);
      padding: .75rem .85rem calc(0.85rem + var(--sab,0));
      max-height: min(72vh, 520px);
      overflow: hidden;

      /* estados: expandido (default) x recolhido */
      transform: translateY(0);
      transition: transform .25s ease;
    }
    .sheet.collapsed{
      /* deixa cabeçalho + alça visíveis (~52px) para liberar o mapa */
      transform: translateY(calc(100% - 52px - var(--sab, 0)));
    }
    .sheet-inner{
      overflow-y:auto; overscroll-behavior: contain;
      max-height: calc(min(72vh, 520px) - 28px);
      padding-bottom: .25rem;
      scrollbar-width: thin;
      scrollbar-color: rgba(148,163,184,.4) transparent;
    }
    .grabber{
      width:56px; height:6px; border-radius:9999px; margin:0 auto .5rem;
      background: linear-gradient(90deg, #94a3b8, #cbd5e1); opacity:.5;
    }
    /* header do popup clicável */
    #sheetHeader{ cursor: pointer; user-select: none; }

    /* Cards de métrica */
    .metric{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.08); border-radius: .9rem; padding:.6rem .7rem;
    }
    .metric .label{ color:#9ca3af; font-size:.72rem; display:flex; align-items:center; gap:.35rem }
    .metric .value{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }

    /* Ações horizontais */
    .actions{ -webkit-overflow-scrolling:touch; }
    .actions > div{ scroll-snap-type: x mandatory; }
    .actions button{ scroll-snap-align:start; }

    /* App bar */
    .appbar{
      background: radial-gradient(100% 100% at 0 0, rgba(0,0,0,.45), rgba(0,0,0,.25));
      border:1px solid rgba(255,255,255,.08);
    }
    .btn{
      border-radius: .9rem; padding:.85rem 1rem; font-weight:600;
      transition: transform .06s ease, box-shadow .2s ease, background .2s ease;
    }
    .btn:active{ transform: scale(.985); }
    .btn-ghost{
      padding:.4rem .6rem; border-radius:.6rem;
      color:#e5e7eb; background:transparent;
    }

    #log { position:absolute; left:0; right:0; bottom:0; z-index:1000; pointer-events:none; }
    #log pre { margin:0; white-space:pre-wrap; word-break:break-word; font:12px/1.4 monospace; color:#e5e7eb; background: linear-gradient(to top, rgba(0,0,0,.65), transparent); padding:.25rem .5rem; max-height:7.5rem; overflow:auto; }
    button:disabled { opacity:.6; cursor:not-allowed; }
  </style>
</head>
<body class="overflow-hidden bg-gray-900">
  <!-- MAPA -->
  <div id="map"></div>

  <!-- APP BAR -->
  <header class="absolute top-0 left-0 right-0 z-[1002] pt-[max(.5rem,var(--sat))]">
    <div class="appbar mx-3 mb-2 rounded-xl backdrop-blur px-3 py-2 flex items-center justify-between">
      <div class="flex items-center gap-2 text-white">
        <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-blue-500/20 border border-blue-400/20">
          <i class="fa-solid fa-truck text-blue-400"></i>
        </span>
        <div class="leading-4">
          <div class="font-semibold tracking-wide">Tracker RioFaz</div>
          <div class="text-[11px] text-white/60 -mt-0.5">Monitoramento em tempo real</div>
        </div>
        <span id="statusDot" class="ml-2 inline-block h-2.5 w-2.5 rounded-full bg-red-500" title="Offline"></span>
      </div>
      <a href="#" id="btnCenter" class="btn-ghost hover:bg-white/10">
        <i class="fa-solid fa-location-crosshairs mr-1"></i> Centralizar
      </a>
    </div>
  </header>

  <!-- BOTTOM SHEET -->
  <section class="sheet" id="sheet" aria-expanded="true">
    <!-- Cabeçalho do popup (CLICÁVEL) -->
    <div id="sheetHeader">
      <div class="grabber"></div>
      <!-- Linha principal: Rota + Permissão -->
      <div class="flex items-center justify-between mb-2">
        <div class="text-sm text-gray-300">
          <span class="text-gray-400">Rota:</span>
          <span class="inline-flex items-center gap-1 rounded-md px-2 py-0.5 text-white bg-white/10 border border-white/10">
            <i class="fa-solid fa-route text-emerald-400"></i>
            <b id="routeIdLabel">—</b>
          </span>
        </div>
        <div class="text-xs text-gray-300">
          <span class="text-gray-400">Permissão:</span>
          <span class="inline-flex items-center gap-1 rounded-md px-1.5 py-0.5 bg-white/5 border border-white/10">
            <i class="fa-solid fa-shield-halved text-indigo-300"></i>
            <b id="permState" class="text-white">?</b>
          </span>
        </div>
      </div>
    </div>

    <div class="sheet-inner">
      <!-- Métricas -->
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 text-sm">
        <div class="metric">
          <div class="label"><i class="fa-regular fa-compass"></i> Lat</div>
          <div id="lat" class="value text-[.95rem]">—</div>
        </div>
        <div class="metric">
          <div class="label"><i class="fa-regular fa-compass"></i> Lng</div>
          <div id="lng" class="value text-[.95rem]">—</div>
        </div>
        <div class="metric">
          <div class="label"><i class="fa-solid fa-gauge-high"></i> Vel (m/s)</div>
          <div id="speed" class="value text-[.95rem]">—</div>
        </div>
        <div class="metric">
          <div class="label"><i class="fa-solid fa-bullseye"></i> Acc (m)</div>
          <div id="accuracy" class="value text-[.95rem]">—</div>
        </div>
        <div class="metric col-span-2 sm:col-span-2">
          <div class="label"><i class="fa-regular fa-clock"></i> Hora</div>
          <div id="timestamp" class="value text-[.95rem]">—</div>
        </div>
        <div class="metric col-span-2 sm:col-span-2">
          <div class="label"><i class="fa-solid fa-sliders"></i> Geo cfg</div>
          <div id="cfgTimeout" class="value text-[.95rem]">—</div>
        </div>
      </div>

      <!-- Endereço + erro -->
      <div class="mt-3 grid gap-2 text-[13px]">
        <div class="rounded-lg border border-white/10 bg-white/5 p-2">
          <div class="text-gray-400 flex items-center gap-2">
            <i class="fa-solid fa-location-dot"></i> Endereço:
          </div>
          <div id="address" class="mt-0.5 leading-5">—</div>
        </div>
        <div class="rounded-lg border border-white/10 bg-white/5 p-2">
          <div class="text-gray-400 flex items-center gap-2">
            <i class="fa-solid fa-triangle-exclamation"></i> Último erro:
          </div>
          <div id="lastErr" class="mt-0.5 leading-5">—</div>
        </div>
      </div>

      <!-- Botões grandes -->
      <div class="mt-3 grid grid-cols-2 gap-2">
        <button id="btnStart" class="btn bg-green-600 hover:bg-green-500/90 focus:ring-2 focus:ring-green-400/50 text-white shadow-[0_10px_30px_-10px_rgba(34,197,94,.6)]">
          <i class="fa-solid fa-play mr-1"></i> Start
        </button>
        <button id="btnStop" class="btn bg-red-600 hover:bg-red-500/90 focus:ring-2 focus:ring-red-400/50 text-white shadow-[0_10px_30px_-10px_rgba(239,68,68,.6)]" disabled>
          <i class="fa-solid fa-stop mr-1"></i> Stop
        </button>
      </div>

      <!-- Ações secundárias -->
      <div class="mt-3 actions overflow-x-auto">
        <div class="flex gap-2 min-w-max">
          <button id="btnLowAcc" class="px-3 py-2 rounded-xl bg-amber-600 hover:bg-amber-500/90 text-white text-sm whitespace-nowrap focus:ring-2 focus:ring-amber-300/40">
            <i class="fa-solid fa-signal mr-1"></i> Baixa precisão
          </button>
          <button id="btnResetGPS" class="px-3 py-2 rounded-xl bg-gray-700 hover:bg-gray-600 text-white text-sm whitespace-nowrap focus:ring-2 focus:ring-gray-300/30">
            <i class="fa-solid fa-arrows-rotate mr-1"></i> Resetar GPS
          </button>
          <button id="btnSave" class="px-3 py-2 rounded-xl bg-blue-600 hover:bg-blue-500/90 text-white text-sm whitespace-nowrap focus:ring-2 focus:ring-blue-300/40">
            <i class="fa-solid fa-download mr-1"></i> Salvar rota
          </button>
          <button id="btnClear" class="px-3 py-2 rounded-xl bg-gray-600 hover:bg-gray-500 text-white text-sm whitespace-nowrap focus:ring-2 focus:ring-gray-300/30">
            <i class="fa-solid fa-eraser mr-1"></i> Limpar
          </button>
        </div>
      </div>

      <p class="mt-3 text-[11px] text-gray-400 leading-4">
        Dica: use HTTPS, permita localização, desative economia de bateria e mantenha a tela ligada.
      </p>
    </div>
  </section>

  <!-- Logs (discreto) -->
  <div id="log"><pre id="logContent" class="text-xs">Logs:</pre></div>

  <script>
    (function(){
      // ========= CONFIG =========
      const DEFAULT_ROUTE_ID = 'coleta1';
      const API_KEY  = '2pCj9VfZs4Dq!wYkR3uN7mH6xB0@tQa';
      const API_HOST = 'https://snow-goose-667329.hostingersite.com';
      const UPDATE_URL = `${API_HOST}/api/update_location.php`;
      const GET_URL    = `${API_HOST}/api/get_update.php`;

      const MIN_DISTANCE_METERS = 3;
      const MIN_TIME_MS         = 2000;
      const LOOP_MS        = 0;
      const HEARTBEAT_MS   = 7000;
      const SERVER_SYNC_MS = 5000;

      const CITY_CENTER = [-22.5440, -42.9510];
      const CITY_ZOOM   = 15;

      const qs = new URLSearchParams(location.search);
      const routeId = (qs.get('route_id') || DEFAULT_ROUTE_ID).toLowerCase();
      document.getElementById('routeIdLabel').textContent = routeId;

      // ========= UI refs =========
      const statusDot = document.getElementById('statusDot');
      const latEl = document.getElementById('lat');
      const lngEl = document.getElementById('lng');
      const speedEl = document.getElementById('speed');
      const accEl = document.getElementById('accuracy');
      const tsEl = document.getElementById('timestamp');
      const addressEl = document.getElementById('address');
      const permEl = document.getElementById('permState');
      const errEl = document.getElementById('lastErr');
      const cfgEl = document.getElementById('cfgTimeout');
      const logBox = document.getElementById('logContent');
      const btnCenter = document.getElementById('btnCenter');

      const btnStart = document.getElementById('btnStart');
      const btnStop  = document.getElementById('btnStop');
      const btnSave = document.getElementById('btnSave');
      const btnClear = document.getElementById('btnClear');
      const btnLowAcc = document.getElementById('btnLowAcc');
      const btnResetGPS = document.getElementById('btnResetGPS');

      // ===== Collapse/Expand do popup pelo cabeçalho =====
      const sheetEl = document.getElementById('sheet');
      const sheetHeaderEl = document.getElementById('sheetHeader');
      let isCollapsed = false;
      function setCollapsed(next) {
        isCollapsed = next;
        sheetEl.classList.toggle('collapsed', isCollapsed);
        sheetEl.setAttribute('aria-expanded', String(!isCollapsed));
      }
      sheetHeaderEl.addEventListener('click', () => setCollapsed(!isCollapsed));

      // ========= Mapa =========
      delete L.Icon.Default.prototype._getIconUrl;
      L.Icon.Default.mergeOptions({
        iconRetinaUrl:'https://unpkg.com/leaflet/dist/images/marker-icon-2x.png',
        iconUrl:'https://unpkg.com/leaflet/dist/images/marker-icon.png',
        shadowUrl:'https://unpkg.com/leaflet/dist/images/marker-shadow.png'
      });
      const map = L.map('map', { zoomControl: false }).setView(CITY_CENTER, CITY_ZOOM);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);
      L.control.zoom({ position: 'topright' }).addTo(map);
      if (L.control?.compass) L.control.compass({ autoActive:true, position: 'topright' }).addTo(map);

      let marker=null, path=[], polyline=L.polyline([], { color:'#22c55e', weight:5 }).addTo(map);
      let watchId=null, wakeLock=null;
      let lastPosition=null, lastUpdateTs=0, lastSendTs=0;
      let lastSentPoint = null;
      let lastFixTs = 0; let consecErrors = 0; let backoffMs = 0;

      // ========= Geo adaptativo =========
      let geoHighAccuracy = true;
      let geoTimeoutMs    = 12000;
      const GEO_BASE      = { maximumAge: 500 };
      function geoOpts(){
        cfgEl.textContent = `${geoHighAccuracy?'alta':'baixa'} / ${geoTimeoutMs}ms`;
        return { ...GEO_BASE, enableHighAccuracy: geoHighAccuracy, timeout: geoTimeoutMs };
      }

      // ========= Utils =========
      function log(s){
        const t=new Date().toLocaleTimeString('pt-BR');
        logBox.textContent += `\n[${t}] ${s}`;
        const wrap=document.getElementById('log'); wrap.scrollTop=wrap.scrollHeight;
      }
      function setStatus(ok){
        statusDot.className = ok ? 'inline-block w-2.5 h-2.5 rounded-full bg-green-400' : 'inline-block w-2.5 h-2.5 rounded-full bg-red-500';
        statusDot.title = ok ? 'Online' : 'Offline';
      }
      async function reverseGeocode(lat,lng){
        try{
          const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`);
          if(!r.ok) return; const j=await r.json(); addressEl.textContent=j.display_name||'—';
        }catch{}
      }
      async function checkPermission(){
        try{
          if(!('permissions' in navigator)){ permEl.textContent='desconhecida'; return; }
          const st=await navigator.permissions.query({name:'geolocation'});
          permEl.textContent=st.state; st.onchange=()=>permEl.textContent=st.state;
        }catch{ permEl.textContent='desconhecida'; }
      }
      checkPermission();

      function toRad(d){ return d * Math.PI / 180; }
      function haversine(a, b){
        if(!a || !b) return Infinity;
        const R = 6371000;
        const dLat = toRad(b.lat - a.lat);
        const dLng = toRad(b.lng - a.lng);
        const lat1 = toRad(a.lat), lat2 = toRad(b.lat);
        const h = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;
        return 2 * R * Math.asin(Math.sqrt(h));
      }

      // ========= UI track =========
      function push(lat,lng,speed,acc,ts){
        latEl.textContent=lat.toFixed(6);
        lngEl.textContent=lng.toFixed(6);
        speedEl.textContent=(speed!=null && !Number.isNaN(speed))?Number(speed).toFixed(2):'—';
        accEl.textContent=(acc!=null && !Number.isNaN(acc))?Number(acc).toFixed(1):'—';
        tsEl.textContent=new Date(ts).toLocaleTimeString('pt-BR');

        if(!marker) marker=L.marker([lat,lng]).addTo(map);
        else marker.setLatLng([lat,lng]);
        map.setView([lat,lng], map.getZoom(), { animate:true });

        path.push([lat,lng]); polyline.addLatLng([lat,lng]);
      }

      // ========= Reverse Geocode desacoplado =========
      let lastRevTs = 0;
      setInterval(()=>{
        if (lastPosition && (Date.now() - lastRevTs) > 12000) {
          lastRevTs = Date.now();
          reverseGeocode(lastPosition.lat, lastPosition.lng);
        }
      }, 2000);

      // ========= Envio ao servidor (com dedupe) =========
      function send(point, force=false){
        const now=Date.now();
        if(!force && (now-lastSendTs)<900) return;

        let shouldSend = false;
        if (!lastSentPoint) {
          shouldSend = true;
        } else {
          const dt   = now - lastSentPoint.ts;
          const dist = haversine(lastSentPoint, point);
          shouldSend = (dt >= MIN_TIME_MS) || (dist >= MIN_DISTANCE_METERS);
        }
        if (!shouldSend && !force) return;

        lastSendTs=now;
        const payload={
          route_id: routeId,
          lat: point.lat,
          lng: point.lng,
          speed: point.speed ?? null,
          accuracy: point.accuracy ?? null,
          timestamp: point.timestamp
        };

        fetch(UPDATE_URL+`?api_key=${encodeURIComponent(API_KEY)}` ,{
          method:'POST',
          headers:{ 'Content-Type':'application/json', 'X-API-KEY': API_KEY },
          body: JSON.stringify(payload)
        })
        .then(async res=>{
          let data=null; try{ data=await res.json(); }catch(_){ }
          if(!res.ok || !data || data.error){ setStatus(false); log(`❌ Erro envio: ${data?.error || res.status}`); }
          else{ setStatus(true); lastSentPoint = { lat: payload.lat, lng: payload.lng, ts: now }; log(`✔️ Enviado lat=${payload.lat.toFixed(5)}, lng=${payload.lng.toFixed(5)}`); }
        })
        .catch(err=>{ setStatus(false); log(`❌ Falha de rede: ${err.message}`); });
      }

      // ========= Handlers geo =========
      function onLocation(pos){
        const { latitude:lat, longitude:lng, speed, accuracy } = pos.coords;
        const ts=Date.now();
        consecErrors=0; backoffMs=0; lastFixTs=ts; lastUpdateTs=ts;
        lastPosition={lat,lng,speed,accuracy,timestamp:ts};
        push(lat,lng,speed,accuracy,ts); send(lastPosition); errEl.textContent='—';
      }
      function onError(err){
        setStatus(false);
        errEl.textContent = `${err.code} - ${err.message}`;
        log(`⚠️ GPS erro: ${err.code} - ${err.message}`);
        consecErrors++;
        if(err.code===1){ log('👉 Permita a localização nas configurações do site e recarregue.'); }
        if(err.code===3){ if(geoHighAccuracy){ geoHighAccuracy=false; log('ℹ️ Ajuste: alta→baixa precisão'); } else { geoTimeoutMs=Math.min(45000, geoTimeoutMs+5000); log(`ℹ️ Ajuste: timeout=${geoTimeoutMs}ms`); } }
        if (consecErrors >= 2) {
          backoffMs = Math.min(10000, (backoffMs || 2000) * 2);
          log(`⏳ Backoff ${backoffMs}ms`);
          if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
          setTimeout(() => { watchId = navigator.geolocation.watchPosition(onLocation,onError,geoOpts()); }, backoffMs);
        } else {
          if (watchId) { navigator.geolocation.clearWatch(watchId); }
          watchId = navigator.geolocation.watchPosition(onLocation,onError,geoOpts());
        }
        fetchServer();
      }

      // ========= Seguir servidor =========
      async function fetchServer(){
        try{
          const r=await fetch(`${GET_URL}?route_id=${encodeURIComponent(routeId)}&t=${Date.now()}`,{cache:'no-store'});
          if(!r.ok) return; const j=await r.json();
          if(typeof j.lat!=='number'||typeof j.lng!=='number') return;
          if(!marker) marker=L.marker([j.lat,j.lng]).addTo(map); else marker.setLatLng([j.lat,j.lng]);
          map.setView([j.lat,j.lng], map.getZoom(), { animate:true });
        }catch(e){ log(`GET erro: ${e.message}`); }
      }

      // ========= Loops =========
      let pollInterval=null, heartbeatInterval=null, syncInterval=null;
      function startLoops(){
        if(!navigator.geolocation){ alert('Navegador sem geolocalização'); log('❌ Sem geolocalização'); fetchServer(); return; }
        watchId = navigator.geolocation.watchPosition(onLocation,onError,geoOpts());
        log('ℹ️ watchPosition iniciado');
        if (pollInterval){ clearInterval(pollInterval); pollInterval=null; }
        if (LOOP_MS && LOOP_MS > 0) { pollInterval = setInterval(()=>{ navigator.geolocation.getCurrentPosition(onLocation,onError,geoOpts()); }, LOOP_MS); }
        if (heartbeatInterval){ clearInterval(heartbeatInterval); heartbeatInterval=null; }
        heartbeatInterval = setInterval(()=>{
          const now=Date.now();
          if(lastPosition && (now-lastUpdateTs)>HEARTBEAT_MS){ send(lastPosition,true); }
          if(now - lastFixTs > 45000){ geoHighAccuracy = !geoHighAccuracy; log(`ℹ️ Alternando para ${geoHighAccuracy?'alta':'baixa'} precisão`); if (watchId) { navigator.geolocation.clearWatch(watchId); } watchId = navigator.geolocation.watchPosition(onLocation,onError,geoOpts()); }
        }, 2000);
        if (syncInterval){ clearInterval(syncInterval); syncInterval=null; }
        syncInterval = setInterval(fetchServer, SERVER_SYNC_MS);
        navigator.geolocation.getCurrentPosition(onLocation,onError,geoOpts());
        fetchServer();
      }
      function stopLoops(){
        if(watchId){ navigator.geolocation.clearWatch(watchId); watchId=null; }
        if(pollInterval){ clearInterval(pollInterval); pollInterval=null; }
        if(heartbeatInterval){ clearInterval(heartbeatInterval); heartbeatInterval=null; }
        if(syncInterval){ clearInterval(syncInterval); syncInterval=null; }
      }

      // ========= WakeLock =========
      async function wake(){
        try{
          if('wakeLock' in navigator){
            const wl=await navigator.wakeLock.request('screen');
            wakeLock=wl; wl.addEventListener('release',()=>log('ℹ️ WakeLock liberado'));
            log('✔️ WakeLock ativo');
          }
        }catch(e){ log('WakeLock falhou: '+e.message); }
      }

      // ========= Botões =========
      btnStart.onclick=()=>{ btnStart.disabled=true; btnStop.disabled=false; wake(); startLoops(); setStatus(true); log('▶️ Start'); };
      btnStop.onclick =()=>{ btnStart.disabled=false; btnStop.disabled=true; stopLoops(); setStatus(false); log('⏹️ Stop'); };
      btnSave.onclick =()=>{
        if(!path.length){ alert('Sem posições para salvar'); return; }
        const data = JSON.stringify({ routeId, path: path.map(([lat,lng])=>({lat,lng})) }, null, 2);
        const url = URL.createObjectURL(new Blob([data],{type:'application/json'}));
        const a=document.createElement('a'); a.href=url; a.download=`${routeId}_rota.json`; a.click(); URL.revokeObjectURL(url);
        log('✅ Rota salva');
      };
      btnClear.onclick=()=>{ path=[]; polyline.setLatLngs([]); if(marker){ map.removeLayer(marker); marker=null; } log('🧹 Limpo'); };
      btnLowAcc.onclick=()=>{ geoHighAccuracy=false; geoTimeoutMs=Math.max(20000, geoTimeoutMs); if(watchId){ navigator.geolocation.clearWatch(watchId); watchId=navigator.geolocation.watchPosition(onLocation,onError,geoOpts()); } log('🔧 Forçado: baixa precisão'); };
      btnResetGPS.onclick=()=>{ consecErrors=0; backoffMs=0; geoHighAccuracy=true; geoTimeoutMs=12000; if(watchId){ navigator.geolocation.clearWatch(watchId); watchId=navigator.geolocation.watchPosition(onLocation,onError,geoOpts()); } navigator.geolocation.getCurrentPosition(onLocation,onError,geoOpts()); log('🔄 Reset GPS'); };
      btnCenter.onclick=(e)=>{ e.preventDefault(); if(lastPosition){ map.setView([lastPosition.lat,lastPosition.lng], Math.max(map.getZoom(), 16), { animate:true }); } else { fetchServer(); } };

      // ========= Visibilidade =========
      document.addEventListener('visibilitychange',()=>{
        if(document.visibilityState==='visible'){ wake(); navigator.geolocation.getCurrentPosition(onLocation,()=>{},geoOpts()); fetchServer(); }
      });

      // Primeira leitura do servidor
      fetchServer();
    })();
  </script>
  <script>
  // Registro do Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/pwa/sw.js', { scope: '/' })
        .then(reg => {
          console.log('SW registrado:', reg.scope);
        })
        .catch(err => console.error('SW falhou:', err));
    });
  }

  // (Opcional) UI para “Adicionar à tela inicial”
  window.addEventListener('beforeinstallprompt', (e) => {
    // Impede o prompt automático
    e.preventDefault();
    // Você pode guardar o evento e exibir seu próprio botão/badge depois
    window.deferredPrompt = e;
    // Exemplo simples: mostrar no log
    console.log('PWA: beforeinstallprompt disponível');
  });
</script>
